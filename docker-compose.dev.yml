# Candin — local development compose
# Sadece PocketBase. Vite dev server'ı host'ta çalıştır.
# Kullanım: docker compose -f docker-compose.dev.yml up -d pb
#           npm run dev
services:
  pb:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: candin-pb
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data
      - ./pb_migrations:/pb_migrations:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
