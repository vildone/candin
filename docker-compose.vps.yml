# Candin — VPS production deploy
# VPS: srv1296724.hstgr.cloud (76.13.14.41)
# Domain: mirac.app
# HTTPS: nginx-proxy-manager üzerinden (SSL termination)
#
# Notlar:
# - Port 8090 VPS'te beszel tarafından kullanılıyor → PB host port 8095
# - Web host port 8760 → nginx-proxy-manager proxy host ile mirac.app'a serve
# - Migrations ilk çalıştırmada otomatik uygulanır (./pb_migrations mount)

services:
  web:
    image: nginx:alpine
    container_name: candin-web
    ports:
      - "8760:80"
    depends_on:
      pb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  pb:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: candin-pb
    ports:
      - "8095:8090"
    volumes:
      - pb_data:/pb_data
      - ./pb_migrations:/pb_migrations:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  pb_data:
