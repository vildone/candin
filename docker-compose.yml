# Candin — VPS production compose
# CasaOS tarafından yönetilir (srv1296724.hstgr.cloud)
# Domain: mirac.app → nginx-proxy-manager → 127.0.0.1:8760
#
# Image stratejisi:
# - web: ghcr.io/vildone/candin-web:latest (GitHub Actions build eder, public GHCR)
# - pb:  ghcr.io/muchobien/pocketbase:latest (resmi community image)
# CasaOS image-based compose'u destekler, package.json'a rağmen image: direktifi kullanılır.
#
# Portlar:
# - 8760: web (Vite/nginx → nginx-proxy-manager proxy host)
# - 8095: PB admin (debug, /_ ve /api proxy nginx-proxy-manager üzerinden)

services:
  web:
    image: ghcr.io/vildone/candin-web:latest
    container_name: candin-web
    ports:
      - "8760:80"
    depends_on:
      pb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  pb:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: candin-pb
    ports:
      - "8095:8090"
    volumes:
      - pb_data:/pb_data
      - ./pb_migrations:/pb_migrations:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  pb_data:
