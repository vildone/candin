# Candin — VPS production compose
# CasaOS tarafından yönetilir (srv1296724.hstgr.cloud)
# Domain: mirac.app → nginx-proxy-manager → 127.0.0.1:8760
#
# Image stratejisi:
# - web: ghcr.io/vildone/candin-web:latest (GitHub Actions build eder, public GHCR)
# - pb:  ghcr.io/muchobien/pocketbase:latest (resmi community image)
#
# ⚠️ CasaOS kısıtı: package.json gördüğü için image: direktifi ne olursa olsun
# default Node.js image kullanır ve `npm run dev` çalıştırır. Bu yüzden Vite dev
# server production'da çalışıyor (port 8765). Compose'da buna göre publish ediyoruz.
#
# Portlar:
# - 8760: web (Vite dev server) → nginx-proxy-manager proxy host mirac.app'a serve
# - 8095: PB admin/debug (PB API nginx-proxy-manager üzerinden /api/* olarak)

services:
  web:
    image: ghcr.io/vildone/candin-web:latest
    container_name: candin-web
    ports:
      - "8760:8765"   # Vite dev server'ın gerçek portu (CasaOS kısıtı)
    depends_on:
      pb:
        condition: service_healthy
    environment:
      - PORT=8765
      - VITE_PB_PROXY=http://candin-pb:8090
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8765/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  pb:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: candin-pb
    ports:
      - "8095:8090"
    volumes:
      - pb_data:/pb_data
      - ./pb_migrations:/pb_migrations:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  pb_data:
