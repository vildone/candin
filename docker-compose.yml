# Miraç — VPS production compose
# CasaOS tarafından yönetilir (srv1296724.hstgr.cloud)
services:
  web:
    image: ghcr.io/vildone/candin-web:latest
    container_name: mirac-web
    ports:
      - "8760:80"
    depends_on:
      pb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  pb:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: mirac-pb
    ports:
      - "8095:8090"
    volumes:
      - pb_data:/pb_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  pb_data:
