# Candin — VPS production compose
# CasaOS tarafından yönetilir (srv1296724.hstgr.cloud)
# Domain: mirac.app → nginx-proxy-manager → 172.17.0.1:8760
#
# Artık nginx static serve! CasaOS root'ta package.json görmüyor,
# image: directive'ını kullanıyor. GHCR'deki multi-stage nginx image.
#
# Portlar:
# - 8760: web (nginx 80) → NPM proxy mirac.app
# - 8095: PB admin/debug → NPM proxy panel.mirac.app

services:
  web:
    image: ghcr.io/vildone/candin-web:latest
    container_name: mirac-web
    ports:
      - "8760:80"
    depends_on:
      pb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  pb:
    image: ghcr.io/vildone/candin-pb:latest
    container_name: mirac-pb
    ports:
      - "8095:8090"
    volumes:
      - pb_data_v2:/pb_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  pb_data_v2:
